<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HJY STORE - متجر توتال سوريا</title>
    <link rel="stylesheet" href="./styles/main.css">
</head>
<body>

    <header class="site-header">
        <div class="container header-inner">
            <div class="logo-area" id="brandLogo">
                <img src="./root/LOGO.WEBP" alt="HJY STORE" style="height: 40px; width: auto; display: block;" onerror="this.src='./root/logo.png'; this.onerror=function(){this.style.display='none'; this.nextElementSibling.style.display='block';};">
                <h1 style="font-size: 24px; color: var(--primary); display: none;">HJY STORE</h1>
            </div>

            <div class="search-box">
                <form id="searchForm">
                    <input type="text" id="searchInput" placeholder="ابحث بالاسم أو الكود أو الوصف...">
                </form>
            </div>

            <button class="cart-btn" id="cartTrigger">
                <span class="count" id="cartCount">0</span>
                <span>السلة</span>
            </button>
        </div>
    </header>

    <main class="container">
        <!-- Filters / Categories -->
        <nav class="filter-bar" id="categoryFilterContainer">
            <button class="filter-pill active" data-category="all">الكل</button>
            <!-- Categories will be injected here -->
        </nav>

        <!-- Stats / Data Info -->
        <div style="text-align: left; font-size: 12px; color: #888; margin-bottom: 10px;" id="dataInfo">
            جاري تحميل البيانات...
        </div>

        <!-- Product Grid -->
        <section class="products-grid" id="catalogGrid">
            <!-- Products will be injected here -->
        </section>

        <!-- Empty State -->
        <div id="catalogEmpty" class="hidden" style="text-align: center; padding: 50px;">
            <h3>لا توجد نتائج مطابقة</h3>
            <p>حاول تغيير كلمات البحث أو التصنيف</p>
        </div>
    </main>

    <!-- Cart Drawer -->
    <div class="overlay" id="overlay"></div>
    <aside id="cartDrawer" class="hidden" style="position: fixed; left: 0; top: 0; bottom: 0; width: 350px; background: #fff; z-index: 1001; box-shadow: 5px 0 15px rgba(0,0,0,0.1); padding: 20px; display: flex; flex-direction: column;">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 15px;">
            <h2>سلة المشتريات</h2>
            <button id="closeCart" style="background: none; border: none; font-size: 24px; cursor: pointer;">&times;</button>
        </div>
        <div id="cartList" style="flex: 1; overflow-y: auto;">
            <!-- Cart items -->
        </div>
        <div style="border-top: 1px solid #eee; padding-top: 15px; margin-top: 15px;">
            <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 18px; margin-bottom: 20px;">
                <span>الإجمالي:</span>
                <span id="cartFinalTotal">0 $</span>
            </div>
            <button class="btn-add" style="width: 100%; padding: 15px;" id="checkoutBtn">إرسال الطلب عبر واتساب</button>
        </div>
    </aside>

    <!-- Templates -->
    <template id="productCardTemplate">
        <article class="product-card">
            <div class="badge-discount hidden"></div>
            <div class="product-image-container">
                <img src="" alt="" loading="lazy">
            </div>
            <div class="product-info">
                <div class="product-code-row">
                    <span class="product-code"></span>
                    <span class="product-brand">HJY</span>
                </div>
                <h3 class="product-name"></h3>
                <div class="price-container">
                    <span class="price-old"></span>
                    <span class="price-new"></span>
                </div>
                <div class="card-actions">
                    <button class="btn-add add-btn">إضافة للسلة</button>
                    <button class="btn-copy copy-btn">نسخ CODE</button>
                </div>
            </div>
        </article>
    </template>

    <script src="./scripts/app.js" defer></script>
</body>
</html>
