<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HJY.co</title>
    <!-- CSS Links -->
    <link rel="stylesheet" href="./styles/main.css">
    <!-- Meta for Mobile -->
    <meta name="theme-color" content="#009688">
    <!-- Excel Support -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>

    <!-- Top Loading Bar -->
    <div id="loadingBar" class="loading-bar"></div>

    <header class="site-header">
        <div class="container header-inner">
            <div class="header-top">
                <div class="logo-area" id="brandLogo">
                    <img src="./root/LOGO.WEBP" alt="HJY STORE" onerror="this.src='./root/logo.png'; this.onerror=function(){this.style.display='none'; this.nextElementSibling.style.display='block';};">
                    <h1 class="logo-text" style="display: none;">HJY STORE</h1>
                </div>
                
                <div class="header-actions">
                    <button class="cart-btn" id="cartTrigger">
                        <span class="count" id="cartCount">0</span>
                        <span class="cart-icon">🛒</span>
                        <span class="cart-label">السلة</span>
                    </button>
                </div>
            </div>

            <div class="header-bottom">
                <div class="search-box">
                    <form id="searchForm" onsubmit="return false;">
                        <input type="text" id="searchInput" placeholder="ابحث عن المنتجات (اسم، كود، وصف)...">
                        <button class="search-btn">🔍</button>
                    </form>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- Categories / Tabs -->
        <nav class="filter-bar" id="categoryFilterContainer">
            <button class="filter-pill active" data-category="all">الكل</button>
            <!-- Categories will be injected here -->
        </nav>

        <!-- Data Sync Status -->
        <div class="data-status" id="dataInfo">
            جاري مزامنة المنتجات...
        </div>

        <!-- Catalog Grid -->
        <section class="products-grid" id="catalogGrid">
            <!-- Product cards will be injected here -->
        </section>

        <!-- No Results -->
        <div id="catalogEmpty" class="empty-state hidden">
            <div class="empty-icon">🔎</div>
            <h3>لا توجد نتائج مطابقة</h3>
            <p>يرجى التأكد من كلمة البحث أو اختيار قسم آخر</p>
        </div>
    </main>

    <!-- Cart Sidebar (Drawer) -->
    <div class="overlay" id="overlay"></div>
    <aside id="cartDrawer" class="cart-drawer hidden">
        <div class="drawer-header">
            <h2>سلة المشتريات</h2>
            <button id="closeCart" class="close-btn">&times;</button>
        </div>
        
        <div id="cartList" class="drawer-content">
            <!-- Cart items -->
        </div>

        <div class="drawer-footer">
            <div class="total-row">
                <span>الإجمالي النهائي:</span>
                <span id="cartFinalTotal">0.00 $</span>
            </div>
            <button class="checkout-btn" id="checkoutBtn">
                <span>تأكيد الطلب عبر واتساب</span>
                <span class="wa-icon">📱</span>
            </button>
        </div>
    </aside>

    <!-- Templates -->
    <template id="productCardTemplate">
        <article class="product-card">
            <!-- Special Badges (Fav, Hot, Out) -->
            <div class="badge-container left" id="specialBadges"></div>
            <!-- Discount Badge -->
            <div class="badge-discount hidden" id="discountBadge"></div>

            <div class="product-image-container">
                <img src="" alt="" loading="lazy">
            </div>

            <div class="product-info">
                <div class="product-meta">
                    <span class="product-code"></span>
                    <span class="brand-tag">HJY</span>
                </div>
                <h3 class="product-name"></h3>
                <p class="product-desc"></p>
                
                <div class="price-row">
                    <div class="price-box">
                        <span class="price-old"></span>
                        <span class="price-new"></span>
                    </div>
                </div>

                <div class="card-actions">
                    <button class="btn-primary add-btn">إضافة للسلة</button>
                    <button class="btn-secondary copy-btn" title="نسخ كود المنتج">نسخ CODE</button>
                </div>
            </div>
        </article>
    </template>

    <!-- Main Script -->
    <script src="./scripts/app.js" defer></script>
</body>
</html>
