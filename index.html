<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HJY.co Store</title>
    <link rel="icon" href="./root/logo.webp">
    <!-- CSS -->
    <link rel="stylesheet" href="./styles/main.css">
    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <meta name="theme-color" content="#009688">
</head>
<body>

    <!-- Loading Bar -->
    <div id="loadingBar" class="loading-bar"></div>

    <!-- Header Section -->
    <header class="topbar">
        <div class="container topbar-inner">
            <!-- Left: Search & Filters -->
            <div class="controls">
                <div class="search-wrap">
                    <div class="search">
                        <input type="text" id="searchInput" placeholder="ابحث عن منتجات...">
                        <span class="search-icon">🔍</span>
                    </div>
                </div>
                <div class="filters">
                    <select id="sortFilter" class="select-filter">
                        <option value="default">افتراضي</option>
                        <option value="high">أعلى سعر</option>
                        <option value="low">أقل سعر</option>
                    </select>
                    <div class="view-modes">
                        <button class="view-btn active" data-view="grid" title="شبكي">🔲</button>
                        <button class="view-btn" data-view="list" title="قائمة">≡</button>
                        <button class="view-btn" data-view="compact" title="مضغوط">▦</button>
                        <button class="view-btn" data-view="brief" title="مختصر">▫</button>
                    </div>
                </div>
            </div>

            <!-- Right: Logo & Name -->
            <div class="brand">
                <div class="brand-text">
                    <h1>HJY.co Store</h1>
                </div>
                <div class="logo">
                    <img src="./root/logo.webp" alt="HJY.co" onerror="this.src='./root/logo.png';">
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- Categories Pill Bar -->
        <nav class="pillbar-container">
            <div id="categoryPills" class="pillbar">
                <!-- Categories injected here -->
            </div>
        </nav>

        <!-- Home Sections (Fav, More Fav, More Sell) -->
        <section id="homeSections" class="home-sections">
            <!-- Section carousels injected here -->
        </section>

        <!-- Catalog Grid -->
        <section id="catalogSection" class="catalog-section">
            <div class="section-header">
                <h2 id="catalogTitle">كل المنتجات</h2>
                <span id="productCount" class="count-badge">0 منتج</span>
            </div>
            <div id="productsGrid" class="products-grid" data-view="grid">
                <!-- Products injected here -->
            </div>
        </section>

        <!-- Empty State -->
        <div id="emptyState" class="empty-state hidden">
            <div class="empty-icon">🔎</div>
            <h3>لا توجد نتائج مطابقة</h3>
            <p>جرب كلمات بحث أخرى أو فئة مختلفة</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="container">
            <div id="footerLinks" class="footer-links">
                <!-- About buttons injected here -->
            </div>
            <div class="footer-bottom">
                <p>BY HJY.co</p>
            </div>
        </div>
    </footer>

    <!-- Floating UI -->
    <button id="cartToggle" class="cart-floating">
        <span class="cart-emoji">🛒</span>
        <span id="cartBadge" class="cart-badge">0</span>
    </button>

    <div id="toastContainer" class="toast-container"></div>

    <!-- Modals -->
    <div id="overlay" class="overlay"></div>
    
    <!-- Full View Modal -->
    <div id="productModal" class="modal">
        <button class="modal-close">&times;</button>
        <div class="modal-content">
            <div class="product-full">
                <div class="product-gallery">
                    <div class="main-img-container">
                        <img id="modalMainImg" src="" alt="">
                        <button class="gallery-nav prev">❮</button>
                        <button class="gallery-nav next">❯</button>
                    </div>
                    <div id="modalThumbnails" class="thumbnails"></div>
                </div>
                <div class="product-details">
                    <div class="detail-header">
                        <span id="modalCode" class="full-code"></span>
                        <h2 id="modalName" class="full-name"></h2>
                    </div>
                    <div class="detail-prices">
                        <span id="modalPriceOld" class="price-old"></span>
                        <span id="modalPriceNew" class="price-now"></span>
                    </div>
                    <div class="detail-desc">
                        <p id="modalAbout1" class="about-1"></p>
                        <hr>
                        <p id="modalAbout2" class="about-2"></p>
                    </div>
                    <div id="modalDiscounts" class="full-discounts"></div>
                    <div class="modal-actions">
                        <button id="modalAddToCart" class="btn-primary">إضافة للسلة</button>
                        <button id="modalShare" class="btn-share">مشاركة ونسخ المنتج 🔗</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- About Content Modal -->
    <div id="aboutModal" class="modal small-modal">
        <button class="modal-close">&times;</button>
        <div class="modal-content">
            <h2 id="aboutTitle"></h2>
            <div id="aboutBody" class="about-body"></div>
        </div>
    </div>

    <!-- Cart Drawer -->
    <aside id="cartDrawer" class="cart-drawer">
        <div class="drawer-header">
            <h2>سلة المشتريات</h2>
            <button id="closeCart" class="close-btn">&times;</button>
        </div>
        <div id="cartList" class="drawer-content"></div>
        <div class="drawer-footer">
            <div class="total-row">
                <span>الإجمالي النهائي:</span>
                <span id="cartFinalTotal">0.00 $</span>
            </div>
            <button id="checkoutBtn" class="checkout-btn">
                تأكيد الطلب عبر واتساب 📱
            </button>
        </div>
    </aside>

    <!-- Scripts -->
    <script src="./scripts/app.js" defer></script>
</body>
</html>
